<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32" fill="none">
  <!--
    Favicon variant — no blur filters, bolder strokes, sharp at 16×16.
    Same convergence concept, simplified for tiny sizes.
  -->
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="32" y2="32" gradientUnits="userSpaceOnUse">
      <stop offset="0%"   stop-color="#0e0c22"/>
      <stop offset="100%" stop-color="#181530"/>
    </linearGradient>
    <linearGradient id="sa" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%"   stop-color="#8b7ff7" stop-opacity="0.80"/>
      <stop offset="100%" stop-color="#8b7ff7" stop-opacity="0"/>
    </linearGradient>
    <linearGradient id="sb" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%"   stop-color="#7c6af7" stop-opacity="0.50"/>
      <stop offset="100%" stop-color="#7c6af7" stop-opacity="0"/>
    </linearGradient>
    <radialGradient id="pool" cx="50%" cy="50%" r="50%">
      <stop offset="0%"   stop-color="#c4b5fd"/>
      <stop offset="100%" stop-color="#6c63f5"/>
    </radialGradient>
  </defs>

  <!-- Background -->
  <rect width="32" height="32" rx="7" fill="url(#bg)"/>
  <!-- Border -->
  <rect x="0.5" y="0.5" width="31" height="31" rx="6.5"
        stroke="#7c6af7" stroke-opacity="0.32" stroke-width="1" fill="none"/>

  <!-- 5 converging streams to pool at (16, 25) -->
  <path d="M  5 4  Q  6 18  16 25" stroke="url(#sb)" stroke-width="1.2" stroke-linecap="round" fill="none"/>
  <path d="M 10 4  Q 11 18  16 25" stroke="url(#sa)" stroke-width="1.6" stroke-linecap="round" fill="none"/>
  <path d="M 16 4  Q 16 17  16 25" stroke="url(#sa)" stroke-width="1.8" stroke-linecap="round" fill="none"/>
  <path d="M 22 4  Q 21 18  16 25" stroke="url(#sa)" stroke-width="1.6" stroke-linecap="round" fill="none"/>
  <path d="M 27 4  Q 26 18  16 25" stroke="url(#sb)" stroke-width="1.2" stroke-linecap="round" fill="none"/>

  <!-- Pool dot -->
  <circle cx="16" cy="25" r="5" fill="#7c6af7" fill-opacity="0.20"/>
  <circle cx="16" cy="25" r="3" fill="url(#pool)"/>
</svg>
