<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 340 80" fill="none">
  <defs>

    <!-- Icon background -->
    <linearGradient id="iconBg" x1="0" y1="0" x2="80" y2="80" gradientUnits="userSpaceOnUse">
      <stop offset="0%"   stop-color="#0e0c22"/>
      <stop offset="100%" stop-color="#181530"/>
    </linearGradient>

    <!-- Stream gradients -->
    <linearGradient id="sa" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%"   stop-color="#8b7ff7" stop-opacity="0.75"/>
      <stop offset="100%" stop-color="#8b7ff7" stop-opacity="0"/>
    </linearGradient>
    <linearGradient id="sb" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%"   stop-color="#7c6af7" stop-opacity="0.45"/>
      <stop offset="100%" stop-color="#7c6af7" stop-opacity="0"/>
    </linearGradient>

    <!-- Pool dot -->
    <radialGradient id="pool" cx="50%" cy="50%" r="50%">
      <stop offset="0%"   stop-color="#c4b5fd"/>
      <stop offset="100%" stop-color="#6c63f5"/>
    </radialGradient>

    <!-- Pool halo -->
    <radialGradient id="halo" cx="40" cy="60" r="18" gradientUnits="userSpaceOnUse">
      <stop offset="0%"   stop-color="#7c6af7" stop-opacity="0.40"/>
      <stop offset="100%" stop-color="#7c6af7" stop-opacity="0"/>
    </radialGradient>

    <!-- Wordmark gradient: white → accent on "Pool" -->
    <linearGradient id="wm" x1="96" y1="0" x2="320" y2="0" gradientUnits="userSpaceOnUse">
      <stop offset="0%"   stop-color="#f0f0fc"/>
      <stop offset="58%"  stop-color="#f0f0fc"/>
      <stop offset="100%" stop-color="#a78bfa"/>
    </linearGradient>

    <filter id="dotGlow" x="-150%" y="-150%" width="400%" height="400%">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>

    <clipPath id="iconClip">
      <rect width="80" height="80" rx="18"/>
    </clipPath>
  </defs>

  <!-- ── ICON MARK ── -->
  <rect width="80" height="80" rx="18" fill="url(#iconBg)"/>
  <rect x="0.75" y="0.75" width="78.5" height="78.5" rx="17.5"
        stroke="#7c6af7" stroke-opacity="0.22" stroke-width="1.5" fill="none"/>

  <g clip-path="url(#iconClip)">
    <!-- Streams converging to pool at (40, 60) -->
    <path d="M 12 8  Q 14 38  40 60" stroke="url(#sb)" stroke-width="1.8" stroke-linecap="round" fill="none"/>
    <path d="M 24 8  Q 27 40  40 60" stroke="url(#sa)" stroke-width="2.4" stroke-linecap="round" fill="none"/>
    <path d="M 40 8  Q 40 40  40 60" stroke="url(#sa)" stroke-width="2.8" stroke-linecap="round" fill="none"/>
    <path d="M 56 8  Q 53 40  40 60" stroke="url(#sa)" stroke-width="2.4" stroke-linecap="round" fill="none"/>
    <path d="M 68 8  Q 66 38  40 60" stroke="url(#sb)" stroke-width="1.8" stroke-linecap="round" fill="none"/>

    <!-- Origin ticks -->
    <rect x="10"  y="8" width="3.5" height="3.5" rx="1.75" fill="#7c6af7" fill-opacity="0.45"/>
    <rect x="22"  y="8" width="3.5" height="3.5" rx="1.75" fill="#8b7ff7" fill-opacity="0.60"/>
    <rect x="38"  y="8" width="3.5" height="3.5" rx="1.75" fill="#9d91ff" fill-opacity="0.75"/>
    <rect x="54"  y="8" width="3.5" height="3.5" rx="1.75" fill="#8b7ff7" fill-opacity="0.60"/>
    <rect x="66"  y="8" width="3.5" height="3.5" rx="1.75" fill="#7c6af7" fill-opacity="0.45"/>
  </g>

  <!-- Pool halo + dot -->
  <circle cx="40" cy="60" r="14" fill="url(#halo)"/>
  <circle cx="40" cy="60" r="8"  fill="#7c6af7" fill-opacity="0.22"/>
  <circle cx="40" cy="60" r="5"  fill="url(#pool)" filter="url(#dotGlow)"/>

  <!-- ── WORDMARK ── -->
  <text x="96" y="46"
        font-family="'Inter', 'Helvetica Neue', Arial, sans-serif"
        font-size="30" font-weight="700" letter-spacing="-0.6"
        fill="url(#wm)">Context Pool</text>

  <text x="97" y="62"
        font-family="'Inter', 'Helvetica Neue', Arial, sans-serif"
        font-size="11" font-weight="400" letter-spacing="1.2"
        fill="#4a4870">DOCUMENT Q&amp;A · NO EMBEDDINGS</text>
</svg>
